name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: verify checksums + compile-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify shipped weights match SHA256SUMS.txt
        run: python3 verify_checksums.py

      - name: Compile-check Python sources
        run: |
          python3 -m py_compile \
            inference.py \
            pipeline.py \
            verify_checksums.py \
            scripts/sanitize_weights.py
